<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Drive</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">

</head>
<body>

<div class="container mt-5">

<h2>Create Placement Drive</h2>

<form method="POST">

<div class="mb-3">
<label class="form-label">Drive Name</label>
<input type="text" class="form-control" name="drive_name">
</div>

<div class="mb-3">
<label class="form-label">Job Title</label>
<input type="text" class="form-control" name="job_title">
</div>

<div class="mb-3">
<label class="form-label">Job Description</label>
<textarea class="form-control" name="job_description"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Eligibility Criteria</label>
<input type="text" class="form-control" name="eligibility">
</div>

<div class="mb-3">
<label class="form-label">Application Deadline</label>
<input type="date" class="form-control" name="deadline">
</div>

<button class="btn btn-success">Create Drive</button>

</form>

</div>

</body>
</html>
